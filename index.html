<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>狮城探险记</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ghibli-blue: #a8dadc;
            --ghibli-dark: #1d3557;
            --ghibli-paper: #f1faee;
        }
        body {
            font-family: "STKaiti", "KaiTi", "楷体", serif;
            background-color: #f8fafc;
            color: #1e293b;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 1.5rem;
        }
        .btn-ghibli {
            background: var(--ghibli-dark);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-ghibli:active { transform: scale(0.96); }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 针对嵌入窗口优化 */
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            margin: 0 auto;
            position: relative;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-100 p-2">

    <div id="app" class="app-container bg-white shadow-2xl rounded-[2.5rem] overflow-hidden flex flex-col">
        <!-- 内容由 JavaScript 动态渲染 -->
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 基础配置
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lion-city-adventure';
        const apiKey = ""; // 运行时自动提供

        // 核心数据
        const vocabData = [
            { word: "拘束", pinyin: "jū shù", meaning: "过分约束自己，显得不自然", sentence: "他在生人面前感到很____。" },
            { word: "嘈杂", pinyin: "cáo zá", meaning: "声音杂乱，不够清静", sentence: "集市里人声鼎沸，十分____。" },
            { word: "沮丧", pinyin: "jǔ sàng", meaning: "灰心失望", sentence: "考试不及格让他感到非常____。" },
            { word: "尴尬", pinyin: "gān gà", meaning: "处境困难，脸面不好看", sentence: "他在台上忘词了，感到非常____。" },
            { word: "毅力", pinyin: "yì lì", meaning: "持久而坚定的意志", sentence: "只要有____，就一定能成功。" },
            { word: "钦佩", pinyin: "qīn pèi", meaning: "敬重佩服", sentence: "他无私奉献的精神令人____。" },
            { word: "遵循", pinyin: "zūn xún", meaning: "依照规定行动", sentence: "我们应该____学校的规章制度。" },
            { word: "轻盈", pinyin: "qīng yíng", meaning: "动作匀称、姿态动人", sentence: "她像燕子一样，步伐____地跳起舞。" },
            { word: "徘徊", pinyin: "pái huái", meaning: "在一个地方来回地走", sentence: "他在校门口____，不知该不该进去。" },
            { word: "奢侈", pinyin: "shē chǐ", meaning: "追求享受，消费过量", sentence: "浪费食物是一种____的行为。" },
            { word: "谴责", pinyin: "qiǎn zé", meaning: "严厉地批评", sentence: "这种不负责任的行为受到了社会的____。" },
            { word: "敏捷", pinyin: "mǐn jé", meaning: "动作迅速灵敏", sentence: "猴子的动作非常____。" }
        ];

        const stageClues = ["教师办公室", "外", "的", "3个字"];
        const CORRECT_ANSWER = "学做人";

        let state = {
            view: 'start',
            user: { name: '', class: '', index: '', uid: '' },
            currentStage: 0,
            clues: [],
            galleryImg: '',
            wrongCount: 0,
            leaderboard: []
        };

        // --- 核心逻辑 ---

        async function initAuth() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) state.user.uid = user.uid;
        });

        async function saveScore() {
            if (!auth.currentUser) return;
            const now = new Date();
            const dateStr = `${now.getMonth() + 1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                await addDoc(colRef, {
                    name: state.user.name,
                    class: state.user.class,
                    index: state.user.index,
                    date: dateStr,
                    timestamp: Date.now()
                });
            } catch (e) { console.error("Save error:", e); }
        }

        function fetchLeaderboard() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
            onSnapshot(colRef, (snapshot) => {
                const data = [];
                snapshot.forEach(doc => data.push(doc.data()));
                state.leaderboard = data.sort((a, b) => b.timestamp - a.timestamp).slice(0, 10);
                if (state.view === 'end') render();
            }, (err) => console.error("Fetch error:", err));
        }

        async function generateImage(prompt) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: { prompt: `Studio Ghibli aesthetic, soft lighting, watercolor style, ${prompt}` },
                        parameters: { sampleCount: 1 }
                    })
                });
                const result = await response.json();
                return `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
            } catch (e) {
                return "https://images.unsplash.com/photo-1518998053901-5348d3961a04?auto=format&fit=crop&w=800&q=80";
            }
        }

        // --- 视图渲染 ---

        window.render = function() {
            const app = document.getElementById('app');
            app.innerHTML = '';

            if (state.view === 'start') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full p-8 text-center fade-in">
                        <div class="mb-8">
                            <h1 class="text-4xl font-bold text-slate-800">狮城探险记</h1>
                            <p class="text-slate-400 mt-2 tracking-widest">National Gallery Mystery</p>
                        </div>
                        <div class="glass-panel p-6 w-full space-y-4 shadow-xl">
                            <input id="name" type="text" placeholder="姓名" class="w-full p-4 rounded-xl border-2 border-slate-50 focus:border-blue-200 outline-none bg-slate-50/50" value="${state.user.name}">
                            <input id="class" type="text" placeholder="班级" class="w-full p-4 rounded-xl border-2 border-slate-50 focus:border-blue-200 outline-none bg-slate-50/50" value="${state.user.class}">
                            <input id="index" type="text" placeholder="座号" class="w-full p-4 rounded-xl border-2 border-slate-50 focus:border-blue-200 outline-none bg-slate-50/50" value="${state.user.index}">
                            <button onclick="startGame()" class="w-full btn-ghibli py-4 rounded-xl font-bold text-lg mt-2">开始调查</button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'loading') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full space-y-4">
                        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                        <p class="text-slate-500 font-medium">正在生成探险现场...</p>
                    </div>
                `;
            } else if (state.view === 'gallery') {
                app.innerHTML = `
                    <div class="fade-in p-6 space-y-6 flex flex-col h-full overflow-y-auto">
                        <div class="rounded-3xl overflow-hidden shadow-2xl aspect-[4/3] bg-slate-100 border-4 border-white">
                            <img src="${state.galleryImg}" class="w-full h-full object-cover">
                        </div>
                        <div class="glass-panel p-6 space-y-4">
                            <h2 class="text-2xl font-bold text-red-600">突发报案！</h2>
                            <p class="text-slate-600 leading-relaxed">侦探 <b>${state.user.name}</b>，国家美术馆有一幅名画离奇失踪。请通过词语考验收集线索，找回珍贵的画作。</p>
                            <button onclick="startStage(0)" class="w-full btn-ghibli py-4 rounded-xl font-bold">进入第一现场</button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'stage') {
                renderStage();
            } else if (state.view === 'investigation') {
                app.innerHTML = `
                    <div class="fade-in p-6 space-y-6 flex flex-col h-full overflow-y-auto">
                        <h2 class="text-2xl font-bold text-center">线索合集</h2>
                        <div class="grid grid-cols-2 gap-4">
                            ${state.clues.map((c, i) => `
                                <div class="bg-white border-2 border-blue-50 rounded-2xl p-4 text-center shadow-sm">
                                    <span class="text-[10px] text-blue-300 font-bold block mb-1">CLUE 0${i+1}</span>
                                    <span class="text-lg font-bold text-slate-700">${c}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="glass-panel p-6 space-y-4 mt-auto">
                            <p class="text-center text-slate-500 text-sm italic">拼凑线索，名画藏在哪里？</p>
                            <input id="final-code" type="text" placeholder="输入最终答案" class="w-full p-4 rounded-xl border-2 text-center text-xl font-bold outline-none focus:border-blue-600">
                            <button onclick="submitFinal()" class="w-full btn-ghibli py-4 rounded-xl font-bold">提交推理</button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'end') {
                const isWin = state.result === 'Win';
                app.innerHTML = `
                    <div class="fade-in p-6 space-y-6 flex flex-col h-full overflow-y-auto text-center pb-10">
                        <div class="text-7xl mt-4">${isWin ? '🏆' : '🕯️'}</div>
                        <h1 class="text-3xl font-black ${isWin ? 'text-blue-900' : 'text-slate-500'}">${isWin ? '破案成功！' : '推理失败'}</h1>
                        
                        <div class="glass-panel p-5 text-left border-l-8 ${isWin ? 'border-blue-600' : 'border-slate-300'}">
                            <p class="text-slate-700">
                                ${isWin ? `太棒了！<b>${state.user.name}</b> 侦探，你成功在<b>“${CORRECT_ANSWER}”</b>找到了丢失的画作。` : '看来某些线索被误读了，名画依然下落不明。'}
                            </p>
                        </div>

                        ${isWin ? `
                        <div class="space-y-3 mt-4">
                            <div class="flex justify-between items-center px-1">
                                <h3 class="font-bold text-slate-800">📜 侦探英雄榜</h3>
                                <span class="text-[10px] text-slate-400">实时数据</span>
                            </div>
                            <div class="overflow-hidden border border-slate-100 rounded-2xl shadow-sm bg-white">
                                <table class="w-full text-left text-xs">
                                    <thead class="bg-slate-800 text-white">
                                        <tr>
                                            <th class="px-3 py-2">侦探</th>
                                            <th class="px-3 py-2">班级</th>
                                            <th class="px-3 py-2 text-center">座号</th>
                                            <th class="px-3 py-2 text-right">日期</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-50">
                                        ${state.leaderboard.length === 0 ? '<tr><td colspan="4" class="p-4 text-center text-slate-300">加载中...</td></tr>' : ''}
                                        ${state.leaderboard.map(entry => `
                                            <tr class="hover:bg-blue-50/50 transition-colors">
                                                <td class="px-3 py-3 font-bold text-blue-800">${entry.name}</td>
                                                <td class="px-3 py-3 text-slate-600">${entry.class}</td>
                                                <td class="px-3 py-3 text-center text-slate-600">${entry.index}</td>
                                                <td class="px-3 py-3 text-right text-[10px] text-slate-400">${entry.date}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        ` : ''}

                        <button onclick="location.reload()" class="w-full btn-ghibli py-4 rounded-xl font-bold mt-4 shadow-xl">重新开始</button>
                    </div>
                `;
            }
        };

        // --- 游戏流程 ---

        window.startGame = async function() {
            const name = document.getElementById('name').value;
            const uClass = document.getElementById('class').value;
            const index = document.getElementById('index').value;
            if (!name || !uClass || !index) return alert("请完善个人档案！");
            
            state.user = { ...state.user, name, class: uClass, index };
            state.view = 'loading';
            render();
            
            await initAuth();
            state.galleryImg = await generateImage("Grand entrance of a classic art gallery, sunny day, vibrant trees");
            state.view = 'gallery';
            render();
        };

        window.startStage = function(num) {
            state.currentStage = num;
            state.wrongCount = 0;
            state.view = 'stage';
            render();
        };

        function renderStage() {
            const app = document.getElementById('app');
            const idx = state.currentStage;
            const vIdx = idx * 3;
            const questions = [
                { q: `意思：<span class="text-blue-600 font-bold">"${vocabData[vIdx].meaning}"</span>`, ans: vocabData[vIdx].word },
                { q: `填空：<span class="text-blue-600 font-bold">"${vocabData[vIdx+1].sentence}"</span>`, ans: vocabData[vIdx+1].word },
                { q: `拼音：<span class="text-blue-600 font-bold">"${vocabData[vIdx+2].pinyin}"</span>`, ans: vocabData[vIdx+2].word }
            ];
            
            app.innerHTML = `
                <div class="fade-in p-6 flex flex-col h-full space-y-6">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center space-x-2">
                            <div class="w-8 h-8 bg-blue-800 text-white rounded-lg flex items-center justify-center font-bold">${idx+1}</div>
                            <span class="font-bold text-slate-700">LEVEL</span>
                        </div>
                        <div class="flex space-x-1">
                            <div class="w-3 h-3 rounded-full ${state.wrongCount >= 1 ? 'bg-red-500' : 'bg-slate-200'}"></div>
                            <div class="w-3 h-3 rounded-full ${state.wrongCount >= 2 ? 'bg-red-500' : 'bg-slate-200'}"></div>
                        </div>
                    </div>
                    <div id="quiz-box" class="flex-grow flex flex-col space-y-4"></div>
                </div>
            `;
            showQuestion(questions, 0);
        }

        function showQuestion(questions, qIdx) {
            const container = document.getElementById('quiz-box');
            const q = questions[qIdx];
            const options = [q.ans, ...vocabData.filter(v => v.word !== q.ans).sort(() => 0.5-Math.random()).slice(0, 3).map(v => v.word)].sort(() => 0.5-Math.random());
            
            container.innerHTML = `
                <div class="glass-panel p-6 border-l-8 border-blue-500 min-h-[140px] flex items-center">
                    <p class="text-lg leading-relaxed text-slate-800">${q.q}</p>
                </div>
                <div class="grid grid-cols-1 gap-3 mt-4">
                    ${options.map(opt => `
                        <button onclick="checkAnswer('${opt}', '${q.ans}', ${qIdx}, ${JSON.stringify(questions).replace(/"/g, '&quot;')})" 
                                class="p-4 bg-white border-2 border-slate-100 rounded-2xl font-bold hover:border-blue-400 hover:text-blue-600 transition-all text-slate-700 shadow-sm">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        window.checkAnswer = function(sel, cor, qIdx, questions) {
            if (sel === cor) {
                if (qIdx < 2) showQuestion(questions, qIdx + 1);
                else finishStage();
            } else {
                state.wrongCount++;
                if (state.wrongCount >= 2) location.reload();
                else showQuestion(questions, qIdx);
            }
        };

        function finishStage() {
            const clue = stageClues[state.currentStage];
            state.clues.push(clue);
            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 bg-blue-900/60 backdrop-blur-sm flex items-center justify-center p-6 z-50 fade-in";
            overlay.innerHTML = `
                <div class="bg-white rounded-[2rem] p-8 text-center space-y-6 max-w-xs shadow-2xl">
                    <div class="text-5xl animate-bounce">🔑</div>
                    <h3 class="text-xl font-bold">获得线索</h3>
                    <div class="text-2xl font-black text-blue-700 bg-blue-50 py-4 rounded-xl">“${clue}”</div>
                    <button id="next-btn" class="w-full btn-ghibli py-3 rounded-xl font-bold">
                        ${state.currentStage < 3 ? '继续下一层' : '解开谜团'}
                    </button>
                </div>
            `;
            document.body.appendChild(overlay);
            document.getElementById('next-btn').onclick = () => {
                overlay.remove();
                if (state.currentStage < 3) {
                    state.currentStage++;
                    render();
                } else {
                    state.view = 'investigation';
                    render();
                }
            };
        }

        window.submitFinal = async function() {
            const val = document.getElementById('final-code').value.trim();
            if (val === CORRECT_ANSWER) {
                state.result = 'Win';
                await saveScore();
                fetchLeaderboard();
            } else {
                state.result = 'Lose';
            }
            state.view = 'end';
            render();
        };

        window.onload = render;
    </script>
</body>
</html>
